name: Deploy to BabalHost

on:
  push:
    branches:
      - main
      - feature/add-bilingual-en-np   # adjust if you want to deploy from this branch
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.babalhost.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          remote-dir: /public_html/   # adjust to your hosting root for www.newgalaxy.edu.np
          # optional: exclude: |
          #   **/.git*
          #   **/node_modules/**
          #   **.gitignore